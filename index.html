<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juanla Weather</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="weather-bg" aria-hidden="true">
    <div id="weather-bg-next"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="lightning-flash"></div>
  </div>
  <header>
    <h1><button id="home-btn" class="home-btn">Juanla Weather</button></h1>
    <search>
      <form id="search-form" role="search">
        <label for="city-input">City</label>
        <input
          type="search"
          id="city-input"
          name="city"
          placeholder="Enter a city name"
          autocomplete="off"
          autofocus
          required
          aria-autocomplete="list"
          aria-controls="autocomplete-list"
        >
        <button type="submit">Search</button>
      </form>
      <ul id="autocomplete-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </search>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </header>

  <main id="weather-results">
    <p class="placeholder">Enter a city to see the current weather.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
