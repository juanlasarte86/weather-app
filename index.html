<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axo Weather</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="weather-bg" aria-hidden="true">
    <div id="weather-bg-next"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="lightning-flash"></div>
  </div>
  <header>
    <h1><button id="home-btn" class="home-btn">
      <svg class="logo-mark" viewBox="0 0 120 112" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#74d0fb">
          <path d="M14 16 C12.6 18.4 12 19.8 12 20.9 a2.3 2.3 0 0 0 4.6 0 C16.6 19.8 15.6 18.4 14 16 Z"/>
          <path d="M8 38 C6.6 40.4 6 41.8 6 42.9 a2.3 2.3 0 0 0 4.6 0 C10.6 41.8 9.6 40.4 8 38 Z"/>
          <path d="M110 30 C108.6 32.4 108 33.8 108 34.9 a2.3 2.3 0 0 0 4.6 0 C112.6 33.8 111.6 32.4 110 30 Z"/>
        </g>
        <path d="M74 34 V66" fill="none" stroke="#4b4b4b" stroke-width="3.4" stroke-linecap="round" transform="rotate(-18 74 34)"/>
        <g fill="#db2777">
          <ellipse cx="29" cy="49" rx="10" ry="4.6" transform="rotate(24 29 49)"/>
          <ellipse cx="25.5" cy="59" rx="11" ry="4.8" transform="rotate(6 25.5 59)"/>
          <ellipse cx="28.5" cy="69" rx="10" ry="4.6" transform="rotate(-24 28.5 69)"/>
          <ellipse cx="71" cy="49" rx="10" ry="4.6" transform="rotate(-24 71 49)"/>
          <ellipse cx="74.5" cy="59" rx="11" ry="4.8" transform="rotate(-6 74.5 59)"/>
          <ellipse cx="71.5" cy="69" rx="10" ry="4.6" transform="rotate(24 71.5 69)"/>
        </g>
        <path d="M61 94 C76 97 86.5 92 87 81.5 C87.3 74.5 81 72 77.8 74 C81 79.5 78 85.5 70.5 88.2 C67 89.4 63.5 89.4 61 88.9 Z" fill="#db2777"/>
        <circle cx="50" cy="63" r="20" fill="#f472b6"/>
        <ellipse cx="50" cy="89" rx="16.5" ry="13" fill="#f472b6"/>
        <ellipse cx="48" cy="92" rx="10" ry="8" fill="#fbcfe8"/>
        <rect x="36.5" y="94" width="8" height="10" rx="4" fill="#db2777"/>
        <rect x="51" y="94" width="8" height="10" rx="4" fill="#db2777"/>
        <ellipse cx="43" cy="60" rx="3.4" ry="4.2" fill="#4b4b4b"/>
        <ellipse cx="57" cy="60" rx="3.4" ry="4.2" fill="#4b4b4b"/>
        <circle cx="44.2" cy="58.4" r="1.3" fill="#fff"/>
        <circle cx="58.2" cy="58.4" r="1.3" fill="#fff"/>
        <path d="M44.5 66 A5.5 5 0 0 0 55.5 66 Z" fill="#4b4b4b"/>
        <ellipse cx="50" cy="69.3" rx="2.8" ry="1.6" fill="#fda4cf"/>
        <circle cx="36.5" cy="66.5" r="3.2" fill="#fbcfe8" opacity="0.9"/>
        <circle cx="63.5" cy="66.5" r="3.2" fill="#fbcfe8" opacity="0.9"/>
        <g transform="rotate(-18 74 34)">
          <path d="M40 34 A34 28 0 0 1 108 34 A8.5 6 0 0 1 91 34 A8.5 6 0 0 1 74 34 A8.5 6 0 0 1 57 34 A8.5 6 0 0 1 40 34 Z" fill="#1cb0f6"/>
          <path d="M57 34 A30 34 0 0 1 74 6 A30 34 0 0 1 91 34 A8.5 6 0 0 1 74 34 A8.5 6 0 0 1 57 34 Z" fill="#74d0fb"/>
          <circle cx="74" cy="6" r="3" fill="#1899d6"/>
        </g>
        <ellipse cx="73.5" cy="70.5" rx="12" ry="4.6" transform="rotate(-29 73.5 70.5)" fill="#f472b6"/>
        <circle cx="84" cy="64.5" r="4.6" fill="#f472b6"/>
      </svg>
      <span class="wordmark"><span class="wm-axo">Axo</span> Weather</span>
    </button></h1>
    <search>
      <form id="search-form" role="search">
        <label for="city-input">City</label>
        <input
          type="search"
          id="city-input"
          name="city"
          placeholder="Enter a city name"
          autocomplete="off"
          autofocus
          required
          aria-autocomplete="list"
          aria-controls="autocomplete-list"
        >
        <button type="submit">Search</button>
      </form>
      <ul id="autocomplete-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </search>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </header>

  <main id="weather-results">
    <p class="placeholder">Enter a city to see the current weather.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
