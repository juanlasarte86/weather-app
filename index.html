<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axo Weather</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="weather-bg" aria-hidden="true">
    <div id="weather-bg-next"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="lightning-flash"></div>
  </div>
  <header>
    <h1><button id="home-btn" class="home-btn">
      <svg class="logo-mark" viewBox="0 0 120 112" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#93c5fd">
          <path d="M20 10 C18.6 12.4 18 13.8 18 14.9 a2.3 2.3 0 0 0 4.6 0 C22.6 13.8 21.6 12.4 20 10 Z"/>
          <path d="M104 6 C102.6 8.4 102 9.8 102 10.9 a2.3 2.3 0 0 0 4.6 0 C106.6 9.8 105.6 8.4 104 6 Z"/>
          <path d="M11 30 C9.6 32.4 9 33.8 9 34.9 a2.3 2.3 0 0 0 4.6 0 C13.6 33.8 12.6 32.4 11 30 Z"/>
        </g>
        <g transform="rotate(-16 66 34)">
          <path d="M66 34 V80" fill="none" stroke="#475569" stroke-width="3.2" stroke-linecap="round"/>
          <path d="M28 34 A38 31 0 0 1 104 34 A9.5 6.5 0 0 1 85 34 A9.5 6.5 0 0 1 66 34 A9.5 6.5 0 0 1 47 34 A9.5 6.5 0 0 1 28 34 Z" fill="#3b82f6"/>
          <path d="M47 34 A34 38 0 0 1 66 3 A34 38 0 0 1 85 34 A9.5 6.5 0 0 1 66 34 A9.5 6.5 0 0 1 47 34 Z" fill="#60a5fa"/>
          <circle cx="66" cy="4" r="3" fill="#1d4ed8"/>
        </g>
        <g fill="#ec4899">
          <ellipse cx="29" cy="48" rx="10" ry="4.4" transform="rotate(38 29 48)"/>
          <ellipse cx="25.5" cy="58" rx="11" ry="4.6" transform="rotate(8 25.5 58)"/>
          <ellipse cx="28.5" cy="68" rx="10" ry="4.4" transform="rotate(-26 28.5 68)"/>
          <ellipse cx="71" cy="48" rx="10" ry="4.4" transform="rotate(-38 71 48)"/>
          <ellipse cx="74.5" cy="58" rx="11" ry="4.6" transform="rotate(-8 74.5 58)"/>
          <ellipse cx="71.5" cy="68" rx="10" ry="4.4" transform="rotate(26 71.5 68)"/>
        </g>
        <path d="M61 94 C76 97 86.5 92 87 81.5 C87.3 74.5 81 72 77.8 74 C81 79.5 78 85.5 70.5 88.2 C67 89.4 63.5 89.4 61 88.9 Z" fill="#ec4899"/>
        <circle cx="50" cy="62" r="20" fill="#f9a8d4"/>
        <ellipse cx="50" cy="88" rx="16" ry="13" fill="#f9a8d4"/>
        <ellipse cx="48" cy="91" rx="9.5" ry="8" fill="#fce7f3"/>
        <rect x="38" y="94" width="7" height="9" rx="3.5" fill="#f472b6"/>
        <rect x="51" y="94" width="7" height="9" rx="3.5" fill="#f472b6"/>
        <circle cx="43" cy="60" r="2.6" fill="#47133d"/>
        <circle cx="57" cy="60" r="2.6" fill="#47133d"/>
        <circle cx="43.9" cy="59.1" r="0.8" fill="#fff"/>
        <circle cx="57.9" cy="59.1" r="0.8" fill="#fff"/>
        <path d="M45 66 Q50 70 55 66" stroke="#47133d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="37.5" cy="65.5" r="3" fill="#f472b6" opacity="0.55"/>
        <circle cx="62.5" cy="65.5" r="3" fill="#f472b6" opacity="0.55"/>
        <ellipse cx="70" cy="80" rx="9" ry="3.8" transform="rotate(-12 70 80)" fill="#f9a8d4"/>
        <circle cx="78" cy="77.5" r="4" fill="#f9a8d4"/>
      </svg>
      <span class="wordmark"><span class="wm-axo">Axo</span> Weather</span>
    </button></h1>
    <search>
      <form id="search-form" role="search">
        <label for="city-input">City</label>
        <input
          type="search"
          id="city-input"
          name="city"
          placeholder="Enter a city name"
          autocomplete="off"
          autofocus
          required
          aria-autocomplete="list"
          aria-controls="autocomplete-list"
        >
        <button type="submit">Search</button>
      </form>
      <ul id="autocomplete-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </search>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </header>

  <main id="weather-results">
    <p class="placeholder">Enter a city to see the current weather.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
