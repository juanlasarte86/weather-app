<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axo Weather</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap"
        media="print" onload="this.media='all'">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="weather-bg" aria-hidden="true">
    <div id="weather-bg-next"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="lightning-flash"></div>
  </div>
  <header>
    <h1><button id="home-btn" class="home-btn">
      <span class="logo-wrap" id="logo-wrap">
        <img class="logo-mark" src="mascot.png" alt="" aria-hidden="true">
        <svg class="logo-accessories" viewBox="0 0 400 394" aria-hidden="true">
          <g class="acc-sunglasses">
            <path d="M216 204 Q229 197 244 204" stroke="#1f2937" stroke-width="7" fill="none" stroke-linecap="round"/>
            <ellipse cx="180" cy="209" rx="42" ry="33" fill="#1f2937"/>
            <ellipse cx="180" cy="209" rx="42" ry="33" fill="none" stroke="#0f172a" stroke-width="3"/>
            <path d="M162 195 Q175 188 190 193" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
            <ellipse cx="277" cy="207" rx="42" ry="33" fill="#1f2937"/>
            <ellipse cx="277" cy="207" rx="42" ry="33" fill="none" stroke="#0f172a" stroke-width="3"/>
            <path d="M259 193 Q272 186 287 191" stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
          </g>
          <g class="acc-coldgear">
            <path d="M115 355 Q100 315 118 278 L152 284 Q140 318 150 350 Z" fill="#f59e0b"/>
            <path d="M120 300 L145 304" stroke="#fde68a" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
            <path d="M116 340 L122 356 M128 342 L133 358 M140 342 L144 359" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
            <rect x="113" y="250" width="182" height="36" rx="18" fill="#f59e0b"/>
            <rect x="113" y="261" width="182" height="6" fill="#fde68a" opacity="0.7"/>
            <path d="M120 180 Q120 118 205 116 Q290 118 290 180 Z" fill="#f59e0b"/>
            <rect x="110" y="167" width="190" height="26" rx="13" fill="#fde68a"/>
            <circle cx="205" cy="120" r="13" fill="#fffbeb" stroke="#fde68a" stroke-width="3"/>
          </g>
        </svg>
      </span>
      <span class="wordmark"><span class="wm-axo">Axo</span> Weather</span>
    </button></h1>
    <search>
      <form id="search-form" role="search">
        <label for="city-input">City</label>
        <input
          type="search"
          id="city-input"
          name="city"
          placeholder="Enter a city name"
          autocomplete="off"
          autofocus
          required
          aria-autocomplete="list"
          aria-controls="autocomplete-list"
        >
        <button type="submit">Search</button>
      </form>
      <ul id="autocomplete-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </search>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </header>

  <main id="weather-results">
    <p class="placeholder">Enter a city to see the current weather.</p>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
