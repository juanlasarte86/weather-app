<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axo Weather</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="weather-bg" aria-hidden="true">
    <div id="weather-bg-next"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="lightning-flash"></div>
  </div>
  <header>
    <h1><button id="home-btn" class="home-btn">
      <svg class="logo-mark" viewBox="0 0 120 118" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#74d0fb">
          <path d="M14 16 C12.6 18.4 12 19.8 12 20.9 a2.3 2.3 0 0 0 4.6 0 C16.6 19.8 15.6 18.4 14 16 Z"/>
          <path d="M8 38 C6.6 40.4 6 41.8 6 42.9 a2.3 2.3 0 0 0 4.6 0 C10.6 41.8 9.6 40.4 8 38 Z"/>
          <path d="M110 30 C108.6 32.4 108 33.8 108 34.9 a2.3 2.3 0 0 0 4.6 0 C112.6 33.8 111.6 32.4 110 30 Z"/>
        </g>
        <rect x="29" y="109" width="48" height="5.5" rx="2.75" fill="#e2e8f0"/>
        <path d="M74 28 V63" fill="none" stroke="#4b4b4b" stroke-width="3.4" stroke-linecap="round" transform="rotate(-18 74 28)"/>
        <g fill="#db2777">
          <ellipse cx="24" cy="48" rx="9.5" ry="4.3" transform="rotate(28 24 48)"/>
          <ellipse cx="20.5" cy="58" rx="10.5" ry="4.5" transform="rotate(6 20.5 58)"/>
          <ellipse cx="23.5" cy="68" rx="9.5" ry="4.3" transform="rotate(-24 23.5 68)"/>
          <ellipse cx="76" cy="48" rx="9.5" ry="4.3" transform="rotate(-28 76 48)"/>
          <ellipse cx="79.5" cy="58" rx="10.5" ry="4.5" transform="rotate(-6 79.5 58)"/>
          <ellipse cx="76.5" cy="68" rx="9.5" ry="4.3" transform="rotate(24 76.5 68)"/>
        </g>
        <path d="M62 101 C72 103 81 100 82.5 92 C83 87 79 85 76.5 86.5 C79 91 76 95.5 69 97 C66.5 97.6 64 97.6 62 97.4 Z" fill="#db2777"/>
        <ellipse cx="50" cy="57" rx="21" ry="18" fill="#f472b6"/>
        <rect x="36" y="60" width="28" height="44" rx="14" fill="#f472b6"/>
        <ellipse cx="50" cy="88" rx="9.5" ry="10.5" fill="#fbcfe8"/>
        <path d="M37 70 Q28 77 29 88" fill="none" stroke="#f472b6" stroke-width="9" stroke-linecap="round"/>
        <rect x="39" y="100" width="8" height="8.5" rx="4" fill="#db2777"/>
        <rect x="53" y="100" width="8" height="8.5" rx="4" fill="#db2777"/>
        <ellipse cx="41" cy="58" rx="7.5" ry="9.5" fill="#fff"/>
        <ellipse cx="59" cy="58" rx="7.5" ry="9.5" fill="#fff"/>
        <ellipse cx="43.5" cy="59" rx="3.6" ry="5" fill="#0d2c3d"/>
        <ellipse cx="56.5" cy="59" rx="3.6" ry="5" fill="#0d2c3d"/>
        <circle cx="44.8" cy="56.5" r="1.6" fill="#fff"/>
        <circle cx="57.8" cy="56.5" r="1.6" fill="#fff"/>
        <path d="M45.5 71 A4.5 4 0 0 0 54.5 71 Z" fill="#4b4b4b"/>
        <ellipse cx="50" cy="73.4" rx="2.2" ry="1.3" fill="#fda4cf"/>
        <g transform="rotate(-18 74 28)">
          <path d="M40 28 A34 26 0 0 1 108 28 A8.5 6 0 0 1 91 28 A8.5 6 0 0 1 74 28 A8.5 6 0 0 1 57 28 A8.5 6 0 0 1 40 28 Z" fill="#1cb0f6"/>
          <path d="M57 28 A30 32 0 0 1 74 2 A30 32 0 0 1 91 28 A8.5 6 0 0 1 74 28 A8.5 6 0 0 1 57 28 Z" fill="#74d0fb"/>
          <circle cx="74" cy="3" r="2.8" fill="#1899d6"/>
        </g>
        <path d="M61 77 Q75 71 83 62" fill="none" stroke="#f472b6" stroke-width="9.5" stroke-linecap="round"/>
        <circle cx="84" cy="61" r="5" fill="#f472b6"/>
      </svg>
      <span class="wordmark"><span class="wm-axo">Axo</span> Weather</span>
    </button></h1>
    <search>
      <form id="search-form" role="search">
        <label for="city-input">City</label>
        <input
          type="search"
          id="city-input"
          name="city"
          placeholder="Enter a city name"
          autocomplete="off"
          autofocus
          required
          aria-autocomplete="list"
          aria-controls="autocomplete-list"
        >
        <button type="submit">Search</button>
      </form>
      <ul id="autocomplete-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </search>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </header>

  <main id="weather-results">
    <p class="placeholder">Enter a city to see the current weather.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
