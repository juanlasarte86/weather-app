<svg viewBox="0 0 120 112" xmlns="http://www.w3.org/2000/svg">
  <!-- raindrops -->
  <g fill="#74d0fb">
    <path d="M14 16 C12.6 18.4 12 19.8 12 20.9 a2.3 2.3 0 0 0 4.6 0 C16.6 19.8 15.6 18.4 14 16 Z"/>
    <path d="M8 38 C6.6 40.4 6 41.8 6 42.9 a2.3 2.3 0 0 0 4.6 0 C10.6 41.8 9.6 40.4 8 38 Z"/>
    <path d="M110 30 C108.6 32.4 108 33.8 108 34.9 a2.3 2.3 0 0 0 4.6 0 C112.6 33.8 111.6 32.4 110 30 Z"/>
  </g>
  <!-- ground shadow -->
  <rect x="27" y="103.5" width="52" height="5.5" rx="2.75" fill="#e2e8f0"/>
  <!-- umbrella shaft, behind the body -->
  <path d="M74 30 V63" fill="none" stroke="#4b4b4b" stroke-width="3.4" stroke-linecap="round" transform="rotate(-18 74 30)"/>
  <!-- gills -->
  <g fill="#db2777">
    <ellipse cx="25" cy="50" rx="9.5" ry="4.3" transform="rotate(28 25 50)"/>
    <ellipse cx="21.5" cy="60" rx="10.5" ry="4.5" transform="rotate(6 21.5 60)"/>
    <ellipse cx="24.5" cy="70" rx="9.5" ry="4.3" transform="rotate(-24 24.5 70)"/>
    <ellipse cx="75" cy="50" rx="9.5" ry="4.3" transform="rotate(-28 75 50)"/>
    <ellipse cx="78.5" cy="60" rx="10.5" ry="4.5" transform="rotate(-6 78.5 60)"/>
    <ellipse cx="75.5" cy="70" rx="9.5" ry="4.3" transform="rotate(24 75.5 70)"/>
  </g>
  <!-- tail peeking behind -->
  <path d="M70 97 C80 99 88 96 89 88 C89.3 83 85 81 82.5 82.5 C85 87 82 92 75 93.5 C72.5 94 71 94 70 93.8 Z" fill="#db2777"/>
  <!-- single bell-shaped body -->
  <path d="M50 42 C36 42 28 54 28 74 C28 90 33 98 50 98 C67 98 72 90 72 74 C72 54 64 42 50 42 Z" fill="#f472b6"/>
  <!-- belly -->
  <ellipse cx="50" cy="85" rx="10.5" ry="9.5" fill="#fbcfe8"/>
  <!-- left arm drooping at the side -->
  <path d="M32 68 Q24 76 25.5 87" fill="none" stroke="#f472b6" stroke-width="9" stroke-linecap="round"/>
  <!-- feet -->
  <rect x="38" y="95" width="8" height="9" rx="4" fill="#db2777"/>
  <rect x="53" y="95" width="8" height="9" rx="4" fill="#db2777"/>
  <!-- big duo-style eyes -->
  <ellipse cx="41" cy="59" rx="7.5" ry="9.5" fill="#fff"/>
  <ellipse cx="59" cy="59" rx="7.5" ry="9.5" fill="#fff"/>
  <ellipse cx="43.5" cy="60" rx="3.6" ry="5" fill="#0d2c3d"/>
  <ellipse cx="56.5" cy="60" rx="3.6" ry="5" fill="#0d2c3d"/>
  <circle cx="44.8" cy="57.5" r="1.6" fill="#fff"/>
  <circle cx="57.8" cy="57.5" r="1.6" fill="#fff"/>
  <!-- mouth -->
  <path d="M45.5 72 A4.5 4 0 0 0 54.5 72 Z" fill="#4b4b4b"/>
  <ellipse cx="50" cy="74.4" rx="2.2" ry="1.3" fill="#fda4cf"/>
  <!-- canopy -->
  <g transform="rotate(-18 74 30)">
    <path d="M40 30 A34 28 0 0 1 108 30 A8.5 6 0 0 1 91 30 A8.5 6 0 0 1 74 30 A8.5 6 0 0 1 57 30 A8.5 6 0 0 1 40 30 Z" fill="#1cb0f6"/>
    <path d="M57 30 A30 34 0 0 1 74 2 A30 34 0 0 1 91 30 A8.5 6 0 0 1 74 30 A8.5 6 0 0 1 57 30 Z" fill="#74d0fb"/>
    <circle cx="74" cy="2" r="3" fill="#1899d6"/>
  </g>
  <!-- right arm raised, connected to the body -->
  <path d="M66 76 Q76 72 82 62" fill="none" stroke="#f472b6" stroke-width="9.5" stroke-linecap="round"/>
  <circle cx="83" cy="60.5" r="5" fill="#f472b6"/>
</svg>
